<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- PWA / iOS standalone -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KEYS">
<meta name="theme-color" content="#0c0a14">

<!-- home-screen icon (replace icon.png with your image; 180×180 recommended) -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<!-- PWA manifest (optional: improves Android/Chrome install behavior) -->
<link rel="manifest" href="manifest.json">

<title>KEYS — 키보드 피아노</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0c0a14;
    --panel: #15121f;
    --panel2: #1d1929;
    --ink: #f4f0ff;
    --amber: #ffae3b;
    --cyan: #4be3d2;
    --magenta: #ff5d8f;
    --dim: #6b6580;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Bricolage Grotesque', sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background:
      radial-gradient(900px 500px at 20% -10%, rgba(255,174,59,0.10), transparent 60%),
      radial-gradient(800px 600px at 90% 110%, rgba(75,227,210,0.10), transparent 60%),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    /* base padding + iOS safe-area insets (notch / home indicator) */
    padding:
      max(18px, env(safe-area-inset-top))
      max(18px, env(safe-area-inset-right))
      max(18px, env(safe-area-inset-bottom))
      max(18px, env(safe-area-inset-left));
  }

  #capture {
    position: absolute;
    top: 0; left: 0;
    width: 1px; height: 1px;
    opacity: 0.001;
    border: none; background: transparent; color: transparent;
    font-size: 16px; caret-color: transparent;
    pointer-events: none;
  }

  header {
    width: min(1040px, 96vw);
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 20px;
  }
  .title { line-height: 0.85; }
  .title h1 {
    font-size: clamp(30px, 6.5vw, 68px);
    font-weight: 800; letter-spacing: -0.04em;
    background: linear-gradient(100deg, var(--amber), var(--magenta) 55%, var(--cyan));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .title p {
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.3em;
    color: var(--dim); text-transform: uppercase;
  }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; align-items: flex-end; }
  .ctl {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 8px 12px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 104px;
  }
  .ctl label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.14em;
    color: var(--dim); text-transform: uppercase;
  }
  .ctl .row { display: flex; align-items: center; gap: 6px; }
  .ctl button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink);
    width: 22px; height: 22px;
    border-radius: 6px; cursor: pointer;
    font-size: 13px; line-height: 1;
    transition: background 0.12s, transform 0.06s;
    flex: none;
  }
  .ctl button:active { transform: scale(0.9); }
  .ctl .val {
    flex: 1; text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700; color: var(--amber);
    white-space: nowrap;
  }
  .ctl .val.cyan { color: var(--cyan); }
  .ctl .val.mag  { color: var(--magenta); }
  .seg {
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; overflow: hidden;
  }
  .seg button {
    border: none; border-radius: 0;
    width: auto; height: 22px; padding: 0 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px; color: var(--dim);
  }
  .seg button.on { background: var(--cyan); color: #06120f; font-weight: 700; }

  .keysbtn {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0 14px; height: 56px;
    color: var(--ink); cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 7px;
    transition: border-color 0.15s, background 0.15s;
  }
  .keysbtn:hover { border-color: rgba(255,174,59,0.5); }
  .keysbtn svg { width: 14px; height: 14px; }

  .modebar {
    width: min(1040px, 96vw);
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .armbtn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 9px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--ink); cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .armbtn .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .armbtn.armed { border-color: rgba(75,227,210,0.55); background: rgba(75,227,210,0.07); }
  .armbtn.armed .dot { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
  .armbtn.hit .dot { background: var(--amber); box-shadow: 0 0 12px var(--amber); }
  .armbtn .lbl::after { content: '키보드 입력 OFF · 탭해서 켜기'; }
  .armbtn.armed .lbl::after { content: '키보드 입력 ON · 탭해서 끄기'; }

  .hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.06em; text-align: right;
  }
  .hint b { color: var(--cyan); }

  .stage {
    width: min(1040px, 96vw);
    background: linear-gradient(180deg, #1c1828, #110e1a);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 18px 18px 22px;
    box-shadow: 0 30px 70px -30px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .feltbar {
    height: 8px; border-radius: 4px; margin-bottom: 14px;
    background: linear-gradient(90deg, var(--amber), var(--magenta), var(--cyan));
    opacity: 0.85;
  }
  .piano { position: relative; display: flex; height: clamp(160px, 28vw, 240px); touch-action: none; }
  .key { position: relative; cursor: pointer; transition: transform 0.04s ease; }
  .white {
    flex: 1;
    background: linear-gradient(180deg, #fbf9ff 0%, #e3dff0 92%, #cbc6dd 100%);
    border: 1px solid #b9b3cc;
    border-radius: 0 0 8px 8px;
    margin: 0 1.5px;
    box-shadow: inset 0 -6px 10px -6px rgba(0,0,0,0.25);
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding-bottom: 12px;
  }
  .white.down {
    background: linear-gradient(180deg, #ffe6b8 0%, #ffcf86 100%);
    transform: translateY(3px);
    box-shadow: inset 0 8px 14px -8px rgba(0,0,0,0.4);
  }
  .black {
    position: absolute; top: 0;
    width: 5.6%; height: 62%;
    background: linear-gradient(180deg, #2a2636 0%, #0c0a12 100%);
    border: 1px solid #000;
    border-radius: 0 0 6px 6px;
    z-index: 2;
    box-shadow: 0 6px 10px -2px rgba(0,0,0,0.7), inset 0 -4px 6px -4px rgba(255,255,255,0.15);
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding-bottom: 8px;
  }
  .black.down {
    background: linear-gradient(180deg, #b8842a 0%, #6e4e12 100%);
    transform: translateY(3px); height: 60%;
  }
  .black.nokey { opacity: 0.82; }
  .klabel { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; }
  .white .klabel { color: #8c86a0; }
  .white.down .klabel { color: #7a4e00; }
  .black .klabel { color: #c9c3da; font-size: 9px; }
  .black.down .klabel { color: #1a1208; }
  .nlabel { font-family: 'Space Mono', monospace; font-size: 8px; margin-top: 2px; }
  .white .nlabel { color: #a39db8; }
  .black .nlabel { display: block; color: #8e88a4; font-size: 7px; }

  /* ---------- key-binding modal ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(6,5,12,0.78);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 50;
  }
  .overlay.show { display: flex; }
  .modal {
    width: min(560px, 96vw);
    max-height: 88vh; overflow-y: auto;
    background: var(--panel2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 22px;
  }
  .modal h2 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .modal .sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.08em; margin-bottom: 16px;
  }
  .bindrow {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .bindrow:last-of-type { border-bottom: none; }
  .bindinfo { flex: 1; min-width: 0; }
  .bindinfo .bn {
    font-size: 14px; font-weight: 700;
  }
  .bindinfo .bd {
    font-family: 'Space Mono', monospace;
    font-size: 9.5px; color: var(--dim);
    margin-top: 2px;
  }
  .bindkeys { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .kcap {
    min-width: 34px; height: 30px;
    padding: 0 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700;
    color: var(--ink); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .kcap:hover { border-color: rgba(255,174,59,0.6); }
  .kcap.listening {
    border-color: var(--amber);
    background: rgba(255,174,59,0.18);
    color: var(--amber);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .kcap.fixed {
    cursor: not-allowed; opacity: 0.55;
    border-style: dashed;
  }
  .modal .foot {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .modal .foot button {
    flex: 1; height: 40px;
    border-radius: 10px; cursor: pointer;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 13px; font-weight: 700;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: var(--ink);
    transition: background 0.12s;
  }
  .modal .foot button.primary {
    background: var(--amber); color: #2a1800; border-color: var(--amber);
  }
  .modal .warn {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--magenta);
    margin-top: 10px; min-height: 14px;
  }
  .modal .note {
    font-family: 'Space Mono', monospace;
    font-size: 9.5px; color: var(--dim);
    margin-top: 14px; line-height: 1.6;
  }

  @media (max-width: 620px) {
    .controls { width: 100%; }
    .klabel { font-size: 9px; }
    .hint { text-align: left; }
  }
</style>
</head>
<body>

<input id="capture" type="text" inputmode="text"
       autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

<header>
  <div class="title">
    <h1>KEYS</h1>
    <p>type to play · keyboard piano</p>
  </div>
  <div class="controls">
    <div class="ctl">
      <label>Octave</label>
      <div class="row">
        <button id="octDown">−</button>
        <span class="val" id="octVal">±0</span>
        <button id="octUp">+</button>
      </div>
    </div>
    <div class="ctl">
      <label>Shift Window</label>
      <div class="row">
        <button id="winDown">−</button>
        <span class="val cyan" id="winVal">A = C4</span>
        <button id="winUp">+</button>
      </div>
    </div>
    <div class="ctl">
      <label>Transpose</label>
      <div class="row">
        <button id="trDown">−</button>
        <span class="val mag" id="trVal">0</span>
        <button id="trUp">+</button>
      </div>
    </div>
    <div class="ctl">
      <label>Volume</label>
      <div class="row">
        <button id="volDown">−</button>
        <span class="val" id="volVal">70</span>
        <button id="volUp">+</button>
      </div>
    </div>
    <div class="ctl">
      <label>Tone</label>
      <div class="seg" id="toneSeg">
        <button data-tone="grand" class="on">GRAND</button>
        <button data-tone="electric">ELEC</button>
        <button data-tone="synth">SYNTH</button>
      </div>
    </div>
    <button class="keysbtn" id="openKeys">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
      </svg>
      단축키
    </button>
  </div>
</header>

<div class="modebar">
  <button class="armbtn" id="armBtn">
    <span class="dot"></span>
    <span class="lbl"></span>
  </button>
  <div class="hint" id="hintText"></div>
</div>

<div class="stage">
  <div class="feltbar"></div>
  <div class="piano" id="piano"></div>
</div>

<!-- key binding modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>단축키 설정</h2>
    <div class="sub">블루투스 키보드 기준 · 키 캡을 누른 뒤 원하는 키를 누르세요</div>
    <div id="bindList"></div>
    <div class="warn" id="bindWarn"></div>
    <div class="note" id="bindNote"></div>
    <div class="foot">
      <button id="resetKeys">기본값 복원</button>
      <button class="primary" id="closeKeys">완료</button>
    </div>
  </div>
</div>

<script>
(() => {
  const NAMES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const IS_WHITE = [true,false,true,false,true,true,false,true,false,true,false,true];

  const MIN_MIDI = 24, MAX_MIDI = 108;
  const allWhite = [];
  for (let m = MIN_MIDI; m <= MAX_MIDI; m++) if (IS_WHITE[m % 12]) allWhite.push(m);

  // ----- play keys: fixed home-position layout -----
  const WHITE_KEYS = ['a','s','d','f','g','h','j','k','l',';'];
  // black-key shortcuts are tied to WHITE-KEY GAPS, mirroring physical QWERTY:
  // gap 0 = A·S, gap 1 = S·D, gap 2 = D·F, ... gap 8 = L·;
  // W E R T Y U I O P sit physically above those gaps.
  const GAP_KEYS = ['w','e','r','t','y','u','i','o','p'];   // index = white-key gap
  const WHITE_COUNT = WHITE_KEYS.length;
  const PLAY_KEYS = new Set([...WHITE_KEYS, ...GAP_KEYS]);

  // ----- function bindings: editable -----
  // each function -> array of keys. 'shift' is a special modifier name.
  const DEFAULT_BINDINGS = {
    octDown:   ['z'],
    octUp:     ['x'],
    winDown:   [','],
    winUp:     ['.'],
    trDown:    ['['],
    trUp:      [']'],
    volDown:   ['-'],
    volUp:     ['='],
    toneGrand: ['1'],
    toneElec:  ['2'],
    toneSynth: ['3'],
    sustain:   ['shift']
  };
  const BIND_META = {
    octDown:   { name: '옥타브 −',        desc: '한 옥타브 아래로 점프' },
    octUp:     { name: '옥타브 +',        desc: '한 옥타브 위로 점프' },
    winDown:   { name: '창 왼쪽 이동',    desc: '흰건반 한 칸 ←' },
    winUp:     { name: '창 오른쪽 이동',  desc: '흰건반 한 칸 →' },
    trDown:    { name: '트랜스포즈 −',    desc: '반음 내림' },
    trUp:      { name: '트랜스포즈 +',    desc: '반음 올림' },
    volDown:   { name: '볼륨 −',          desc: '소리 작게' },
    volUp:     { name: '볼륨 +',          desc: '소리 크게' },
    toneGrand: { name: '음색: GRAND',     desc: '어쿠스틱 피아노' },
    toneElec:  { name: '음색: ELEC',      desc: '일렉트릭 피아노' },
    toneSynth: { name: '음색: SYNTH',     desc: '신스' },
    sustain:   { name: '서스테인',        desc: '누르는 동안 음 지속' }
  };
  let bindings = JSON.parse(JSON.stringify(DEFAULT_BINDINGS));

  // ----- state -----
  let actx = null, masterGain = null;
  let volume = 0.7, tone = 'grand', sustain = false;
  let windowStart = allWhite.indexOf(60);
  if (windowStart < 0) windowStart = 0;
  let transpose = 0;
  const active = new Map();

  // ----- audio -----
  function ensureAudio() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = volume;
    const comp = actx.createDynamicsCompressor();
    masterGain.connect(comp); comp.connect(actx.destination);
  }
  function freqForMidi(m) { return 440 * Math.pow(2, (m - 69) / 12); }
  const TONES = {
    grand:    {types:['triangle','sine'],   mix:[0.7,0.3], decay:1.8, attack:0.006},
    electric: {types:['sine','sine'],       mix:[0.8,0.4], decay:2.6, attack:0.004, detune:6},
    synth:    {types:['sawtooth','square'], mix:[0.5,0.25],decay:0.9, attack:0.012}
  };
  function noteOn(keyMidi) {
    const sound = keyMidi + transpose;
    if (active.has(sound)) return;
    ensureAudio();
    if (actx.state === 'suspended') actx.resume();
    const cfg = TONES[tone], f = freqForMidi(sound), now = actx.currentTime;
    const gain = actx.createGain();
    gain.connect(masterGain);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.9, now + cfg.attack);
    gain.gain.exponentialRampToValueAtTime(0.18, now + cfg.decay);
    const oscs = [];
    cfg.types.forEach((t, i) => {
      const osc = actx.createOscillator();
      osc.type = t; osc.frequency.value = f;
      if (cfg.detune) osc.detune.value = (i ? cfg.detune : -cfg.detune);
      const og = actx.createGain();
      og.gain.value = cfg.mix[i];
      osc.connect(og); og.connect(gain);
      osc.start(now); oscs.push(osc);
    });
    active.set(sound, {oscs, gain});
  }
  function noteOff(keyMidi) {
    const sound = keyMidi + transpose;
    const v = active.get(sound);
    if (!v) return;
    active.delete(sound);
    const release = sustain ? 1.4 : 0.28;
    const now = actx.currentTime, g = v.gain.gain;
    g.cancelScheduledValues(now);
    g.setValueAtTime(Math.max(g.value, 0.0001), now);
    g.exponentialRampToValueAtTime(0.0001, now + release);
    v.oscs.forEach(o => o.stop(now + release + 0.05));
  }
  function nameOf(m) { return NAMES[((m % 12) + 12) % 12] + (Math.floor(m / 12) - 1); }

  // ----- build window -----
  const piano = document.getElementById('piano');
  const elByMidi = {};
  const keyByChar = {};   // play-key char -> keyMidi

  function buildWindow() {
    piano.innerHTML = '';
    for (const k in elByMidi) delete elByMidi[k];
    for (const k in keyByChar) delete keyByChar[k];

    const whites = [];
    for (let i = 0; i < WHITE_COUNT; i++) {
      const idx = windowStart + i;
      if (idx < allWhite.length) whites.push(allWhite[idx]);
    }
    whites.forEach((midi, i) => {
      const el = document.createElement('div');
      el.className = 'key white';
      const ch = WHITE_KEYS[i];
      keyByChar[ch] = midi;
      el.innerHTML = `<span class="klabel">${ch.toUpperCase()}</span>
                      <span class="nlabel">${nameOf(midi + transpose)}</span>`;
      bindPointer(el, midi);
      piano.appendChild(el);
      elByMidi[midi] = el;
    });
    // black keys: a black key exists in the GAP between two adjacent white keys
    // only when they are 2 semitones apart. The shortcut for that black key is
    // tied to the WHITE-KEY GAP (gap i = between white shortcut i and i+1),
    // NOT to a running count of black keys. This keeps W=A·S gap, E=S·D gap, etc.
    // GAP_KEYS[i] = black-key shortcut sitting in gap i (between white i and i+1).
    // gaps with no possible black key on a piano are left empty.
    const blackSlots = [];
    for (let i = 0; i < whites.length - 1; i++) {
      if (whites[i + 1] - whites[i] === 2)
        blackSlots.push({ midi: whites[i] + 1, gapIndex: i });
    }
    const unit = 100 / WHITE_COUNT;
    blackSlots.forEach(slot => {
      const el = document.createElement('div');
      el.className = 'key black';
      el.style.left = ((slot.gapIndex + 1) * unit - 2.8) + '%';
      // shortcut is determined by WHICH GAP this black key sits in
      const ch = GAP_KEYS[slot.gapIndex];
      if (ch) {
        keyByChar[ch] = slot.midi;
        el.innerHTML = `<span class="klabel">${ch.toUpperCase()}</span>
                        <span class="nlabel">${nameOf(slot.midi + transpose)}</span>`;
      } else {
        el.classList.add('nokey');
        el.innerHTML = `<span class="klabel"></span>
                        <span class="nlabel">${nameOf(slot.midi + transpose)}</span>`;
      }
      bindPointer(el, slot.midi);
      piano.appendChild(el);
      elByMidi[slot.midi] = el;
    });
    document.getElementById('winVal').textContent = 'A = ' + nameOf(whites[0]);
    // octave readout: how many full octaves from the C4 home position
    const homeIdx = allWhite.indexOf(60);
    const octShift = Math.round((windowStart - homeIdx) / 7);
    document.getElementById('octVal').textContent =
      octShift > 0 ? '+' + octShift : (octShift < 0 ? '' + octShift : '±0');
  }
  function visualOn(m)  { elByMidi[m]?.classList.add('down'); }
  function visualOff(m) { elByMidi[m]?.classList.remove('down'); }
  function bindPointer(el, keyMidi) {
    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      // touch playing does NOT auto-enable the keyboard;
      // but if keyboard mode is already on, keep its focus alive
      refocusIfEnabled();
      noteOn(keyMidi); visualOn(keyMidi);
    });
    const up = () => { noteOff(keyMidi); visualOff(keyMidi); };
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', e => {
      if (e.buttons) { noteOff(keyMidi); visualOff(keyMidi); }
    });
  }
  function releaseAllHeld() {
    held.forEach(ch => {
      const m = keyByChar[ch];
      if (m != null) { noteOff(m); visualOff(m); }
    });
    held.clear();
  }

  // ----- functions -----
  function shiftWindow(d) {
    const maxStart = allWhite.length - WHITE_COUNT;
    const next = Math.max(0, Math.min(maxStart, windowStart + d));
    if (next === windowStart) return;
    releaseAllHeld(); windowStart = next; buildWindow();
  }
  function setTranspose(t) {
    const next = Math.max(-24, Math.min(24, t));
    if (next === transpose) return;
    releaseAllHeld(); transpose = next;
    document.getElementById('trVal').textContent = transpose > 0 ? '+' + transpose : '' + transpose;
    buildWindow();
  }
  function setVol(v) {
    volume = Math.max(0, Math.min(1, Math.round(v * 10) / 10));
    document.getElementById('volVal').textContent = Math.round(volume * 100);
    if (masterGain) masterGain.gain.value = volume;
  }
  function setTone(name) {
    tone = name;
    document.querySelectorAll('#toneSeg button').forEach(b =>
      b.classList.toggle('on', b.dataset.tone === name));
  }

  // ----- capture field / keyboard enable toggle -----
  const capture = document.getElementById('capture');
  const armBtn = document.getElementById('armBtn');
  let kbEnabled = false;   // is keyboard input active?

  // focus the hidden field -> opens soft keyboard on mobile, captures keys
  function focusCapture() {
    capture.style.pointerEvents = 'auto';
    capture.focus({ preventScroll: true });
    capture.style.pointerEvents = 'none';
    capture.value = '';
  }
  // re-grab focus, but ONLY if keyboard mode is on (used after touch / control taps)
  function refocusIfEnabled() {
    if (kbEnabled) focusCapture();
  }
  // explicit on/off toggle (the arm button)
  function toggleKeyboard() {
    if (kbEnabled) {
      kbEnabled = false;
      capture.blur();                 // closes soft keyboard on mobile
      releaseAllHeld();               // drop any notes held via keyboard
      armBtn.classList.remove('armed');
    } else {
      kbEnabled = true;
      focusCapture();
      armBtn.classList.add('armed');
    }
  }
  // keep the indicator in sync if focus is lost/gained on its own
  capture.addEventListener('focus', () => { if (kbEnabled) armBtn.classList.add('armed'); });
  capture.addEventListener('blur',  () => {
    // while the shortcut modal is open, focus juggling is expected -> don't change state
    if (overlay.classList.contains('show')) return;
    armBtn.classList.remove('armed');
    // losing focus while enabled (e.g. tapped elsewhere) counts as turning off
    kbEnabled = false;
  });
  capture.addEventListener('input', () => { capture.value = ''; });
  armBtn.addEventListener('click', toggleKeyboard);
  function flashHit() {
    armBtn.classList.add('hit');
    clearTimeout(flashHit._t);
    flashHit._t = setTimeout(() => armBtn.classList.remove('hit'), 90);
  }

  // ----- reverse lookup: key char -> function id -----
  let actionByKey = {};
  function rebuildActionMap() {
    actionByKey = {};
    for (const fn in bindings) {
      bindings[fn].forEach(k => { actionByKey[k] = fn; });
    }
  }
  const ACTIONS = {
    octDown:  () => shiftWindow(-7),
    octUp:    () => shiftWindow(7),
    winDown:  () => shiftWindow(-1),
    winUp:    () => shiftWindow(1),
    trDown:   () => setTranspose(transpose - 1),
    trUp:     () => setTranspose(transpose + 1),
    volDown:  () => setVol(volume - 0.1),
    volUp:    () => setVol(volume + 0.1),
    toneGrand:() => setTone('grand'),
    toneElec: () => setTone('electric'),
    toneSynth:() => setTone('synth')
  };

  // ----- key handling -----
  const held = new Set();
  function normKey(e) {
    if (e.key === 'Shift') return 'shift';
    return (e.key || '').toLowerCase();
  }
  function handleDown(e) {
    if (listening) return;            // modal is grabbing keys
    if (!kbEnabled) return;           // keyboard input turned off -> ignore
    if (e.repeat) return;
    const k = normKey(e);

    // sustain (modifier-style)
    if (actionByKey[k] === 'sustain') { sustain = true; return; }
    // one-shot function keys
    if (k in actionByKey && ACTIONS[actionByKey[k]]) {
      ACTIONS[actionByKey[k]]();
      flashHit(); e.preventDefault(); return;
    }
    // play keys
    if (PLAY_KEYS.has(k) && !held.has(k)) {
      held.add(k);
      const m = keyByChar[k];
      if (m != null) { noteOn(m); visualOn(m); }
      flashHit(); e.preventDefault();
    }
  }
  function handleUp(e) {
    if (listening) return;
    if (!kbEnabled) return;
    const k = normKey(e);
    if (actionByKey[k] === 'sustain') { sustain = false; return; }
    if (held.has(k)) {
      held.delete(k);
      const m = keyByChar[k];
      if (m != null) { noteOff(m); visualOff(m); }
    }
  }
  capture.addEventListener('keydown', handleDown);
  capture.addEventListener('keyup', handleUp);
  window.addEventListener('keydown', handleDown);
  window.addEventListener('keyup', handleUp);
  window.addEventListener('blur', releaseAllHeld);

  // ----- header buttons -----
  document.getElementById('winUp').onclick   = () => shiftWindow(1);
  document.getElementById('winDown').onclick = () => shiftWindow(-1);
  document.getElementById('octUp').onclick   = () => shiftWindow(7);
  document.getElementById('octDown').onclick = () => shiftWindow(-7);
  document.getElementById('trUp').onclick    = () => setTranspose(transpose + 1);
  document.getElementById('trDown').onclick  = () => setTranspose(transpose - 1);
  document.getElementById('volUp').onclick   = () => setVol(volume + 0.1);
  document.getElementById('volDown').onclick = () => setVol(volume - 0.1);
  document.getElementById('toneSeg').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (btn) setTone(btn.dataset.tone);
  });

  // ----- key label helpers -----
  function keyLabel(k) {
    if (k === 'shift') return 'SHIFT';
    if (k === ' ') return 'SPACE';
    if (k === ',') return ','; if (k === '.') return '.';
    return k.toUpperCase();
  }

  // ----- binding modal -----
  const overlay = document.getElementById('overlay');
  const bindList = document.getElementById('bindList');
  const bindWarn = document.getElementById('bindWarn');
  let listening = null;   // {fn, slotIndex} while waiting for a key

  function renderBindings() {
    bindList.innerHTML = '';
    for (const fn in BIND_META) {
      const meta = BIND_META[fn];
      const row = document.createElement('div');
      row.className = 'bindrow';
      const info = document.createElement('div');
      info.className = 'bindinfo';
      info.innerHTML = `<div class="bn">${meta.name}</div><div class="bd">${meta.desc}</div>`;
      const keys = document.createElement('div');
      keys.className = 'bindkeys';
      bindings[fn].forEach((k, idx) => {
        const cap = document.createElement('div');
        cap.className = 'kcap';
        cap.textContent = keyLabel(k);
        cap.onclick = () => startListen(fn, idx, cap);
        keys.appendChild(cap);
      });
      row.appendChild(info);
      row.appendChild(keys);
      bindList.appendChild(row);
    }
    document.getElementById('bindNote').innerHTML =
      '연주 건반(A~; · W~P 줄)은 손 위치 고정이라 변경 대상이 아닙니다.<br>' +
      '설정은 이 세션에만 적용됩니다.';
  }

  function startListen(fn, idx, cap) {
    if (listening) return;
    listening = { fn, idx };
    cap.classList.add('listening');
    cap.textContent = '...';
    bindWarn.textContent = '키를 누르세요 (ESC 취소)';
  }

  // capture keystrokes while assigning
  window.addEventListener('keydown', e => {
    if (!listening) return;
    e.preventDefault(); e.stopPropagation();
    if (e.key === 'Escape') { renderBindings(); listening = null; bindWarn.textContent = ''; return; }
    const k = normKey(e);
    // reject play keys to avoid clobbering the piano
    if (PLAY_KEYS.has(k)) {
      bindWarn.textContent = '연주 건반(' + keyLabel(k) + ')은 기능에 쓸 수 없어요';
      return;
    }
    // reject duplicate within another function
    const owner = actionByKey[k];
    if (owner && owner !== listening.fn) {
      bindWarn.textContent = '"' + keyLabel(k) + '"는 이미 [' + BIND_META[owner].name + ']에 할당됨';
      return;
    }
    bindings[listening.fn][listening.idx] = k;
    rebuildActionMap();
    listening = null;
    bindWarn.textContent = '';
    renderBindings();
    updateHint();
  }, true);   // capture phase so it runs before play handler

  document.getElementById('openKeys').onclick = () => {
    renderBindings();
    overlay.classList.add('show');
    // focus the hidden field so a key can be captured even if keyboard mode is off
    // (on mobile this also raises the soft keyboard for re-assignment)
    focusCapture();
  };
  document.getElementById('closeKeys').onclick = () => {
    overlay.classList.remove('show');
    listening = null;
    refocusIfEnabled();
  };
  document.getElementById('resetKeys').onclick = () => {
    bindings = JSON.parse(JSON.stringify(DEFAULT_BINDINGS));
    rebuildActionMap();
    renderBindings();
    updateHint();
    bindWarn.textContent = '기본값으로 되돌렸습니다';
  };
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('show');
      listening = null;
      refocusIfEnabled();
    }
  });

  // ----- dynamic hint line -----
  function updateHint() {
    const b = bindings;
    document.getElementById('hintText').innerHTML =
      '흰건반 <b>A S D F G H J K L ;</b> · 검은건반 <b>W E R T Y U I O P</b><br>' +
      '옥타브 <b>' + keyLabel(b.octDown[0]) + '</b>/<b>' + keyLabel(b.octUp[0]) + '</b>' +
      ' · 창 이동 <b>' + keyLabel(b.winDown[0]) + '</b>/<b>' + keyLabel(b.winUp[0]) + '</b>' +
      ' · 트랜스포즈 <b>' + keyLabel(b.trDown[0]) + '</b>/<b>' + keyLabel(b.trUp[0]) + '</b>' +
      ' · 서스테인 <b>' + keyLabel(b.sustain[0]) + '</b>';
  }

  // ----- init -----
  rebuildActionMap();
  buildWindow();
  updateHint();
})();
</script>
</body>
</html>
